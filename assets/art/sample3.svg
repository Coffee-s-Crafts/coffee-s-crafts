<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a003a"/>
      <stop offset="100%" stop-color="#003040"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg3)"/>
  <!-- concentric hexagons -->
  <polygon points="400,80 650,220 650,500 400,640 150,500 150,220" fill="none" stroke="#9b59b6" stroke-width="6" opacity=".9"/>
  <polygon points="400,160 590,270 590,450 400,560 210,450 210,270" fill="none" stroke="#1abc9c" stroke-width="5" opacity=".8"/>
  <polygon points="400,240 530,310 530,410 400,480 270,410 270,310" fill="none" stroke="#e74c3c" stroke-width="4" opacity=".7"/>
  <polygon points="400,310 480,355 480,370 400,415 320,370 320,355" fill="#9b59b6" opacity=".4"/>
  <!-- diagonal lines -->
  <line x1="150" y1="220" x2="650" y2="580" stroke="#1abc9c" stroke-width="2" opacity=".3"/>
  <line x1="650" y1="220" x2="150" y2="580" stroke="#9b59b6" stroke-width="2" opacity=".3"/>
  <!-- circles at vertices -->
  <circle cx="400" cy="80" r="14" fill="#e74c3c"/>
  <circle cx="650" cy="220" r="14" fill="#9b59b6"/>
  <circle cx="650" cy="500" r="14" fill="#1abc9c"/>
  <circle cx="400" cy="640" r="14" fill="#e74c3c"/>
  <circle cx="150" cy="500" r="14" fill="#9b59b6"/>
  <circle cx="150" cy="220" r="14" fill="#1abc9c"/>
  <!-- center -->
  <circle cx="400" cy="400" r="28" fill="#fff" opacity=".15"/>
  <circle cx="400" cy="400" r="12" fill="#fff" opacity=".5"/>
  <text x="400" y="760" text-anchor="middle" font-size="28" fill="#fff" font-family="Georgia,serif" opacity="0.6">Abstract Geometric</text>
</svg>
