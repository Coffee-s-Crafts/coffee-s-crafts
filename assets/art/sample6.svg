  <path d="M400 305 Q390 265 405 235 Q420 205 410 175" fill="none" stroke="#aaa" stroke-width="7" stroke-linecap="round" opacity=".7"/>
  <path d="M450 315 Q440 275 455 248 Q470 218 460 188" fill="none" stroke="#aaa" stroke-width="7" stroke-linecap="round" opacity=".7"/>
  <!-- label on cup -->
