<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#f0f8ff"/>
  <!-- outer badge ring -->
  <circle cx="400" cy="400" r="340" fill="#ffd700" stroke="#333" stroke-width="10"/>
  <!-- star burst ring -->
  <polygon points="400,75 430,175 528,100 480,195 590,180 515,255 624,300 510,320 580,420 468,400 490,515 410,455 370,565 340,450 228,510 275,395 154,375 258,330 170,255 280,265 210,165 316,200" fill="#ff8c00" opacity=".85" stroke="#333" stroke-width="4"/>
  <!-- inner white circle -->
  <circle cx="400" cy="400" r="230" fill="#fff" stroke="#333" stroke-width="8"/>
  <!-- coffee cup -->
  <rect x="300" y="330" width="200" height="160" rx="18" fill="#6f4e37" stroke="#333" stroke-width="6"/>
