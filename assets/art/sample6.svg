  <!-- badge text -->
  <text x="400" y="600" text-anchor="middle" font-size="36" fill="#333" font-family="Georgia,serif" font-weight="bold">Coffee's Crafts</text>
  <text x="400" y="635" text-anchor="middle" font-size="20" fill="#6f4e37" font-family="Georgia,serif">✦ est. 2024 ✦</text>
