<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0c2a"/>
      <stop offset="60%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#3d2260"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky2)"/>
  <!-- stars -->
  <circle cx="80" cy="60" r="2" fill="#fff" opacity=".9"/>
  <circle cx="200" cy="30" r="1.5" fill="#fff" opacity=".8"/>
  <circle cx="350" cy="80" r="2" fill="#fff"/>
  <circle cx="500" cy="40" r="1.5" fill="#fff" opacity=".7"/>
  <circle cx="650" cy="70" r="2" fill="#fff" opacity=".9"/>
  <circle cx="730" cy="25" r="1.5" fill="#fff"/>
  <circle cx="120" cy="120" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="440" cy="110" r="2" fill="#fff" opacity=".8"/>
  <!-- moon -->
  <circle cx="660" cy="120" r="55" fill="#fff8c0"/>
  <circle cx="685" cy="105" r="50" fill="#1a1a4e"/>
  <!-- hills -->
  <ellipse cx="0" cy="480" rx="320" ry="200" fill="#1e3a1e"/>
  <ellipse cx="400" cy="520" rx="400" ry="180" fill="#163016"/>
  <ellipse cx="800" cy="490" rx="300" ry="190" fill="#1e3a1e"/>
  <!-- cabin -->
  <rect x="330" y="380" width="140" height="110" fill="#4a2c0a"/>
  <polygon points="290,380 510,380 400,290" fill="#6b3a12"/>
  <rect x="365" y="440" width="40" height="50" fill="#1a0d00"/>
  <rect x="395" y="395" width="35" height="30" fill="#ffe080" opacity=".8"/>
  <!-- chimney smoke -->
  <circle cx="460" cy="275" r="12" fill="#aaa" opacity=".3"/>
  <circle cx="455" cy="250" r="10" fill="#aaa" opacity=".2"/>
  <!-- glow -->
  <ellipse cx="400" cy="490" rx="90" ry="20" fill="#ffe080" opacity=".15"/>
  <text x="400" y="580" text-anchor="middle" font-size="26" fill="#fff" font-family="Georgia,serif" opacity="0.6">Cozy Night Scene</text>
</svg>
