<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#fff8f0"/>
  <!-- background washes -->
  <ellipse cx="400" cy="400" rx="350" ry="350" fill="#ffe4e1" opacity=".4"/>
  <ellipse cx="300" cy="350" rx="200" ry="200" fill="#ffc0cb" opacity=".2"/>
  <!-- stem -->
  <path d="M400 720 Q380 600 400 480" fill="none" stroke="#6aaa60" stroke-width="10" stroke-linecap="round"/>
  <path d="M400 600 Q330 550 280 520" fill="none" stroke="#6aaa60" stroke-width="7" stroke-linecap="round"/>
  <path d="M400 560 Q470 510 510 480" fill="none" stroke="#6aaa60" stroke-width="7" stroke-linecap="round"/>
  <!-- leaves -->
  <ellipse cx="310" cy="530" rx="55" ry="28" fill="#4CAF50" opacity=".7" transform="rotate(-30,310,530)"/>
  <ellipse cx="490" cy="495" rx="55" ry="28" fill="#4CAF50" opacity=".7" transform="rotate(25,490,495)"/>
  <!-- petals (big flower) -->
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ff8fab" opacity=".8" transform="rotate(0,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ff8fab" opacity=".7" transform="rotate(45,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ffb3c6" opacity=".7" transform="rotate(90,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ffb3c6" opacity=".7" transform="rotate(135,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ff8fab" opacity=".7" transform="rotate(180,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ffc2d1" opacity=".7" transform="rotate(225,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ffc2d1" opacity=".7" transform="rotate(270,400,480)"/>
  <ellipse cx="400" cy="310" rx="70" ry="120" fill="#ff8fab" opacity=".7" transform="rotate(315,400,480)"/>
  <!-- centre -->
  <circle cx="400" cy="480" r="55" fill="#ffe066"/>
  <circle cx="400" cy="480" r="30" fill="#ffd700"/>
  <!-- small buds -->
  <circle cx="240" cy="340" r="30" fill="#ff8fab" opacity=".6"/>
  <circle cx="240" cy="340" r="16" fill="#ffb3c6" opacity=".8"/>
  <circle cx="570" cy="310" r="25" fill="#ff8fab" opacity=".6"/>
  <circle cx="570" cy="310" r="13" fill="#ffb3c6" opacity=".8"/>
  <text x="400" y="780" text-anchor="middle" font-size="28" fill="#c2185b" font-family="Georgia,serif" opacity=".7">Floral Illustration</text>
</svg>
