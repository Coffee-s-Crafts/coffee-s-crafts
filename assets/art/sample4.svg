<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#fff0f5"/>
  <!-- body -->
  <ellipse cx="400" cy="660" rx="160" ry="120" fill="#ffb7c5"/>
  <!-- tail -->
  <path d="M540 700 Q650 600 620 480 Q600 420 560 450" fill="none" stroke="#ff7fa0" stroke-width="28" stroke-linecap="round"/>
  <!-- legs -->
  <ellipse cx="330" cy="770" rx="50" ry="30" fill="#ffb7c5"/>
  <ellipse cx="470" cy="770" rx="50" ry="30" fill="#ffb7c5"/>
  <!-- head -->
  <ellipse cx="400" cy="440" rx="160" ry="150" fill="#ffb7c5"/>
  <!-- ears -->
  <polygon points="270,320 240,200 340,280" fill="#ffb7c5"/>
  <polygon points="530,320 560,200 460,280" fill="#ffb7c5"/>
  <polygon points="278,308 256,222 330,278" fill="#ff7fa0"/>
  <polygon points="522,308 544,222 470,278" fill="#ff7fa0"/>
  <!-- eyes -->
  <ellipse cx="340" cy="430" rx="42" ry="48" fill="#fff"/>
  <ellipse cx="460" cy="430" rx="42" ry="48" fill="#fff"/>
  <ellipse cx="343" cy="436" rx="26" ry="32" fill="#333"/>
  <ellipse cx="463" cy="436" rx="26" ry="32" fill="#333"/>
  <circle cx="351" cy="422" r="9" fill="#fff"/>
  <circle cx="471" cy="422" r="9" fill="#fff"/>
  <!-- nose + mouth -->
  <ellipse cx="400" cy="488" rx="10" ry="7" fill="#ff7fa0"/>
  <path d="M380 502 Q400 522 420 502" fill="none" stroke="#ff7fa0" stroke-width="4" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="240" y1="490" x2="360" y2="496" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="240" y1="505" x2="362" y2="506" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="440" y1="496" x2="560" y2="490" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="438" y1="506" x2="560" y2="505" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- blush -->
  <ellipse cx="296" cy="475" rx="30" ry="18" fill="#ff9090" opacity=".4"/>
  <ellipse cx="504" cy="475" rx="30" ry="18" fill="#ff9090" opacity=".4"/>
  <!-- collar + bell -->
  <rect x="300" y="548" width="200" height="28" rx="14" fill="#ff5578"/>
  <circle cx="400" cy="576" r="14" fill="#ffd700"/>
  <text x="400" y="780" text-anchor="middle" font-size="28" fill="#d63384" font-family="Georgia,serif" opacity=".7">Chibi Character</text>
</svg>
