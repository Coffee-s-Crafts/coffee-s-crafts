<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="60%">
      <stop offset="0%" stop-color="#ffe0c8"/>
      <stop offset="100%" stop-color="#c47a55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg1)"/>
  <!-- body -->
  <ellipse cx="400" cy="720" rx="180" ry="140" fill="#a0522d"/>
  <!-- neck -->
  <rect x="360" y="560" width="80" height="100" rx="12" fill="#f5cba7"/>
  <!-- head -->
  <ellipse cx="400" cy="440" rx="130" ry="150" fill="#f5cba7"/>
  <!-- ears -->
  <ellipse cx="272" cy="440" rx="28" ry="38" fill="#f5cba7"/>
  <ellipse cx="528" cy="440" rx="28" ry="38" fill="#f5cba7"/>
  <!-- hair -->
  <ellipse cx="400" cy="320" rx="135" ry="80" fill="#5c2a00"/>
  <rect x="270" y="310" width="50" height="160" rx="25" fill="#5c2a00"/>
  <rect x="480" y="310" width="50" height="160" rx="25" fill="#5c2a00"/>
  <!-- eyes -->
  <ellipse cx="345" cy="430" rx="32" ry="36" fill="#fff"/>
  <ellipse cx="455" cy="430" rx="32" ry="36" fill="#fff"/>
  <ellipse cx="349" cy="434" rx="18" ry="22" fill="#3b1a00"/>
  <ellipse cx="459" cy="434" rx="18" ry="22" fill="#3b1a00"/>
  <circle cx="355" cy="424" r="6" fill="#fff"/>
  <circle cx="465" cy="424" r="6" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="400" cy="480" rx="10" ry="6" fill="#d4956a"/>
  <!-- mouth -->
  <path d="M370 512 Q400 534 430 512" fill="none" stroke="#a0522d" stroke-width="5" stroke-linecap="round"/>
  <!-- blush -->
  <ellipse cx="310" cy="480" rx="28" ry="16" fill="#ff9090" opacity="0.4"/>
  <ellipse cx="490" cy="480" rx="28" ry="16" fill="#ff9090" opacity="0.4"/>
  <!-- label -->
  <text x="400" y="780" text-anchor="middle" font-size="32" fill="#fff" font-family="Georgia,serif" opacity="0.75">Character Portrait</text>
</svg>
