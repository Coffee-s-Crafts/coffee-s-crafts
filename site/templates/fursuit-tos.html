<!doctype html>
<html lang="en">
<head>
  <title>%%FURSUIT_TOS_TITLE%% — %%SITE_TITLE%%</title>
  {{> head}}
</head>
<body>
  {{> header}}

  <main class="page-content">
    <section class="content-panel tos">
      <h1>%%FURSUIT_TOS_TITLE%%</h1>
      <p class="updated">%%FURSUIT_TOS_UPDATED%%</p>

      {{#each FURSUIT_TOS_SECTIONS}}
      <article class="tos-section">
        <h2>{{this.heading}}</h2>
        {{#each this.paragraphs}}<p>{{this}}</p>{{/each}}
      </article>
      {{/each}}

    </section>
  </main>

  {{> footer}}
</body>
</html>
