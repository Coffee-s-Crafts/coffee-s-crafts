<!doctype html>
<html lang="en">
<head>
  <title>%%GALLERY_HEADING%% — %%SITE_TITLE%%</title>
  {{> head}}
</head>
<body>
  {{> header}}

  <main>
    <section>
      <h2>%%GALLERY_HEADING%%</h2>
      <p class="gallery-meta">%%GALLERY_META%%</p>
      <ul class="art-list">
        %%GALLERY_IMAGES%%
      </ul>
    </section>
  </main>

  <!-- Image modal -->
  <div id="imageModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true">
      <button id="modalClose" class="modal-close" aria-label="Close">✕</button>
      <img id="modalImg" src="" alt="" />
      <div id="modalCaption" class="modal-caption"></div>
    </div>
  </div>

  <script>
    (function(){
      function openModal(img){
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const caption = document.getElementById('modalCaption');
        modalImg.src = img.src;
        modalImg.alt = img.alt || '';
        // show resolution when available
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        caption.textContent = `${w} × ${h} — ${img.src.split('/').pop()}`;
        modal.classList.add('open');
        modal.setAttribute('aria-hidden','false');
      }
      function closeModal(){
        const modal = document.getElementById('imageModal');
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden','true');
        document.getElementById('modalImg').src='';
      }
      document.addEventListener('click', function(e){
        const target = e.target;
        if(target.closest('.art-list') && target.tagName === 'IMG'){
          e.preventDefault();
          openModal(target);
        }
      });
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('imageModal').addEventListener('click', function(e){
        if(e.target.id === 'imageModal') closeModal();
      });
      document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });
    })();
  </script>
  {{> footer}}
</body>
</html>
