<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>%%SITE_TITLE%%</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,700;1,400&family=Shrikhand&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <span class="brand">%%SITE_TITLE%%</span>
    <nav>
      <a href="%%INDEX_LINK%%">Home</a>
      <a href="%%GALLERY_LINK%%">Gallery</a>
      <a href="%%CONTACT_LINK%%">Contact</a>
    </nav>
  </header>

  <div class="hero">
    <h1>%%SITE_TITLE%%</h1>
    <p class="tagline">%%HERO_TAGLINE%%</p>
    <a href="%%GALLERY_LINK%%" class="btn">%%HERO_CTA%%</a>
  </div>

  <main>
    <section>
      <h2>%%ABOUT_HEADING%%</h2>
      <div class="about-blurb">
        <p>%%ABOUT_BODY%%</p>
        <p>%%ABOUT_CTA_INTRO%% <a href="%%CONTACT_LINK%%">%%ABOUT_CTA_LINK_TEXT%%</a>.</p>
      </div>
    </section>

    <section>
      <h2>%%FEATURED_HEADING%%</h2>
      <ul class="art-list">
        %%SAMPLE_IMAGES%%
      </ul>
      <p style="margin-top:1rem"><a href="%%GALLERY_LINK%%">%%GALLERY_MORE_TEXT%%</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>%%FOOTER_TEXT%%</p>
  </footer>
</body>
</html>
