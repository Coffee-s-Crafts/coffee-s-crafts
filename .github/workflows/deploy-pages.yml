name: Build and Deploy Pages

on:
  workflow_dispatch:
  push: {}
  pull_request: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      deployments: write
      id-token: write
    env:
      SITE_TITLE: ${{ secrets.SITE_TITLE }}
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
      # Build uses local art assets
      ART_SOURCE_DIR: ${{ secrets.ART_SOURCE_DIR }}
      OUTPUT_DIR: 'dist'
      INDEX_LINK: 'index.html'
      GALLERY_LINK: 'gallery.html'
      CONTACT_LINK: 'contact.html'
      # Enable VGEN gallery fetching when `USE_VGEN` is true and `VGEN_PORTFOLIO` is set
      USE_VGEN: 'true'
      VGEN_PORTFOLIO: ${{ secrets.VGEN_PORTFOLIO }}
      VGEN_URL: ${{ secrets.VGEN_URL }}
      SAMPLE_COUNT: ${{ secrets.SAMPLE_COUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Show build environment
        run: |
          echo "--- Build environment ---"
          env | grep -E 'ART_SOURCE_DIR|OUTPUT_DIR|SAMPLE_COUNT|GITHUB_ACTIONS' || true
          node -e "console.log('NODE ENV vars:', { GITHUB_ACTIONS: process.env.GITHUB_ACTIONS, ART_SOURCE_DIR: process.env.ART_SOURCE_DIR })"

      - name: Build site
        run: |
          node site/build.js

      - name: Archive dist
        run: |
          echo "dist contents:" && ls -la dist || true

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/configure-pages@v3

      - name: Upload artifact for GitHub Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Dispatch pages-build-deployment event
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && success() }}
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: pages-build-deployment
          client-payload: '{"source":"build-and-deploy","ref":"refs/heads/main"}'

      - name: Create GitHub deployment (so it shows in Deployments)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && success() }}
        run: |
          echo "Creating deployment for $GITHUB_REPOSITORY on $GITHUB_REF"
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d '{"ref":"refs/heads/main","task":"pages","auto_merge":false,"required_contexts":[],"environment":"github-pages","description":"GitHub Pages deployment from CI"}' || true
