name: Build and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SITE_TITLE: ${{ secrets.SITE_TITLE }}
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
      ART_SOURCE_DIR: ${{ secrets.ART_SOURCE_DIR }}
      OUTPUT_DIR: 'dist'
      INDEX_LINK: 'index.html'
      GALLERY_LINK: 'gallery.html'
      CONTACT_LINK: 'contact.html'
      VGEN_URL: ${{ secrets.VGEN_URL }}
      DISCORD_URL: ${{ vars.DISCORD_URL }}
      DISCORD_LINK_TEXT: ${{ vars.DISCORD_LINK_TEXT }}
      TELEGRAM_URL: ${{ vars.TELEGRAM_URL }}
      TELEGRAM_LINK_TEXT: ${{ vars.TELEGRAM_LINK_TEXT }}
      TRELLO_URL: ${{ vars.TRELLO_URL }}
      TRELLO_LINK_TEXT: ${{ vars.TRELLO_LINK_TEXT }}
      QUEUE_TRACKING_TEXT: ${{ vars.QUEUE_TRACKING_TEXT }}
      TWITCH_URL: ${{ vars.TWITCH_URL }}
      TWITCH_LINK_TEXT: ${{ vars.TWITCH_LINK_TEXT }}
      FURSUIT_TOS_LINK: ${{ vars.FURSUIT_TOS_LINK }}
      FURSUIT_TOS_LINK_TEXT: ${{ vars.FURSUIT_TOS_LINK_TEXT }}
      FURSUIT_QUEUE_URL: ${{ vars.FURSUIT_QUEUE_URL }}
      FURSUIT_QUEUE_LINK_TEXT: ${{ vars.FURSUIT_QUEUE_LINK_TEXT }}
      FURSUIT_QUEUE_TEXT: ${{ vars.FURSUIT_QUEUE_TEXT }}
      TOYHOUSE_URL: ${{ vars.TOYHOUSE_URL }}
      TOYHOUSE_LINK_TEXT: ${{ vars.TOYHOUSE_LINK_TEXT }}
      INSTAGRAM_URL: ${{ vars.INSTAGRAM_URL }}
      INSTAGRAM_LINK_TEXT: ${{ vars.INSTAGRAM_LINK_TEXT }}
      CARRD_URL: ${{ vars.CARRD_URL }}
      CARRD_LINK_TEXT: ${{ vars.CARRD_LINK_TEXT }}
      X_URL: ${{ vars.X_URL }}
      X_LINK_TEXT: ${{ vars.X_LINK_TEXT }}
      COMMISSION_STATUS: ${{ secrets.COMMISSION_STATUS }}
      SAMPLE_COUNT: ${{ secrets.SAMPLE_COUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Show build environment
        run: |
          echo "--- Build environment ---"
          env | grep -E 'ART_SOURCE_DIR|OUTPUT_DIR|SAMPLE_COUNT|GITHUB_ACTIONS' || true
          node -e "console.log('NODE ENV vars:', { GITHUB_ACTIONS: process.env.GITHUB_ACTIONS, ART_SOURCE_DIR: process.env.ART_SOURCE_DIR })"

      - name: Build site
        run: |
          node site/build.js

      - name: Archive dist
        run: |
          echo "dist contents:" && ls -la dist || true

      - name: Deploy to gh-pages branch
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: coffeescrafts.com
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
