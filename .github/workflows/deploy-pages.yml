name: Build and Deploy Pages

on:
  workflow_dispatch:
  push: {}
  pull_request: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        env:
          SITE_TITLE: ${{ secrets.SITE_TITLE }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          VGEN_URL: ${{ secrets.VGEN_URL }}
          # Enable fetching images from vgen portfolio during CI build
          USE_VGEN_IMAGES: 'true'
          VGEN_PORTFOLIO_URL: 'https://vgen.co/CoffeeEX/portfolio'
          ART_SOURCE_DIR: ${{ secrets.ART_SOURCE_DIR }}
          OUTPUT_DIR: 'dist'
          SAMPLE_COUNT: ${{ secrets.SAMPLE_COUNT }}
        run: |
          node site/build.js

      - name: Archive dist
        run: |
          echo "dist contents:" && ls -la dist || true

      - name: Deploy to gh-pages branch
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: coffeescrafts.com
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
