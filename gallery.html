  <!-- Image modal -->
  <div id="imageModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true">
      <button id="modalClose" class="modal-close" aria-label="Close">✕</button>
      <img id="modalImg" src="" alt="" />
      <div id="modalCaption" class="modal-caption"></div>
    </div>
  </div>

  <script>
    (function(){
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImg');
      const caption = document.getElementById('modalCaption');
      const closeBtn = document.getElementById('modalClose');

      // Ensure modal is a direct child of <body> so it's not clipped by ancestor stacking contexts
      if (modal && modal.parentNode !== document.body) document.body.appendChild(modal);

      function openModal(img){
        modalImg.src = img.src;
        modalImg.alt = img.alt || '';
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        caption.textContent = `${w} × ${h} — ${img.src.split('/').pop()}`;
        modal.classList.add('open');
        modal.setAttribute('aria-hidden','false');
        // prevent background scroll
        document.body.style.overflow = 'hidden';
      }

      function closeModal(){
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden','true');
        modalImg.src = '';
        document.body.style.overflow = '';
      }

      document.addEventListener('click', function(e){
        const target = e.target;
        if((target.closest('.art-list') || target.closest('.fursuit-list')) && target.tagName === 'IMG'){
          e.preventDefault();
          openModal(target);
        }
      });

      closeBtn.addEventListener('click', closeModal);

      // Click outside content closes
      modal.addEventListener('click', function(e){ if (e.target === modal) closeModal(); });
      document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });
    })();
  </script>
    <footer class="site-footer">
    <p>© 2026 Coffee's Crafts — coffee@coffeescrafts.com — <a href="tos.html">📄 Terms of Service</a> | <a href="fursuit-tos.html">📄 Fursuit TOS</a></p>
  </footer>

</body>
</html>
